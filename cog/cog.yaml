build:
  gpu: true
  python_version: "3.11"
  cuda: "12.8"
  system_packages:
    - "ffmpeg"
    - "libsndfile1"
    - "git"
  python_packages:
    - "torch==2.10.0+cu128"
    - "torchaudio==2.10.0+cu128"
    - "torchvision==0.25.0+cu128"
    - "transformers>=4.51.0,<4.58.0"
    - "diffusers"
    - "safetensors==0.7.0"
    - "einops>=0.8.1"
    - "accelerate>=1.12.0"
    - "peft>=0.18.0"
    - "soundfile>=0.13.1"
    - "scipy>=1.10.1"
    - "loguru>=0.7.3"
    - "huggingface-hub>=0.30.0"
    - "numpy"
  run:
    - "pip install --extra-index-url https://download.pytorch.org/whl/cu128 torch==2.10.0+cu128 torchaudio==2.10.0+cu128"

predict: "predict.py:Predictor"
image: "r8.im/frow/acestep-lofi"
